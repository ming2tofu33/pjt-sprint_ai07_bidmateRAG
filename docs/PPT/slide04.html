<!DOCTYPE html>

<html lang="ko">
<head>

<meta charset="utf-8"/>

<body style="margin: 0; padding: 0; overflow: hidden; background: #FAFAFA;">
<div class="slide-container" style="position: relative; width: 1280px; height: 720px; overflow: hidden; background: #FAFAFA;">

</p>
</div>
<!-- Header Right -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 45px; left: 800px; width: 400px; text-align: right; z-index: 10;">
<p style="font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; color: #475569; letter-spacing: 0.5px; margin: 0;"><span style="font-weight: 700; color: #475569;">04</span><span style="font-weight: 500; color: #94A3B8;">/31</span></p>

<!-- Large Quote Mark Textbox - Fixed quote symbol (matching " in screenshot) and positioning -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 215px; left: 190px; width: 100px; height: 80px; z-index: 10;">
<p style="font-family: 'Black Han Sans', sans-serif; font-size: 80px; color: #FF7B9C; margin: 0; line-height: 1;">
            "
        </p>
</div>
<!-- Main Typography Textbox - Shifted down to distribute vertical space better and avoid 100px+ tail strip -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 320px; left: 190px; width: 950px; height: 200px; z-index: 10;">
<p style="font-family: 'Black Han Sans', sans-serif; font-size: 82px; color: #111827; letter-spacing: -3px; margin: 0; line-height: 1.1;">
            RAG의 주요 병목은<br/>검색 단계에 있는가
        </p>
</div>

<div data-object="true" data-object-type="textbox" style="position: absolute; top: 550px; left: 190px; width: 900px; height: 40px; z-index: 10;">
<p style="font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 26px; font-weight: 500; color: #475569; letter-spacing: -0.5px; margin: 0;">
            이 발표에서는 성공·실패 사례와 Top-K 실측을 통해 이 가설을 검토합니다.
        </p>
</div>
<!-- Callout Box Shape - Adjusted top for spacing and filled bottom tail -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 615px; left: 190px; width: 680px; height: 50px; background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 12px; box-shadow: 0 2px 4px -1px rgba(0,0,0,0.02); z-index: 1;"></div>
<!-- Callout Box Textbox - Vertically centered in box -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 628px; left: 206px; width: 650px; height: 30px; z-index: 10;">
<p style="font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 500; color: #475569; margin: 0;">
<span style="font-weight: 700; color: #111827;">예고:</span> 시나리오 B는 해석 단계, 시나리오 A는 모델 제약이 두드러집니다.
        </p>
</div>
<!-- Bottom Divider -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 680px; left: 80px; width: 1120px; height: 1px; background: #E2E8F0; z-index: 1;"></div>

<div data-object="true" data-object-type="textbox" style="position: absolute; top: 693px; left: 80px; width: 1120px; height: 20px; z-index: 10;">
<p style="font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500; color: #64748B; margin: 0; text-align: right;">가설 제시 · 섹션 ①</p>
</div>
</div>
</body>
</html>
