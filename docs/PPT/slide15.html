<script>
        const ctx = document.getElementById('mrrCumulativeChart').getContext('2d');
        
        const dataLabelsPlugin = {
            id: 'dataLabels',
            afterDatasetsDraw(chart, args, pluginOptions) {
                const { ctx, data } = chart;
                ctx.save();
                ctx.font = "bold 16px 'Noto Sans KR', sans-serif";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                
                chart.getDatasetMeta(0).data.forEach((bar, index) => {
                    const value = data.datasets[0].data[index];
                    ctx.fillStyle = index === 3 ? '#FFC759' : '#607196'; 
                    ctx.fillText(value.toFixed(2), bar.x, bar.y - 10);
                });
                ctx.restore();
            }
        };

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['베이스라인', '+데이터 정제', '+단락 청킹', '+메타데이터 필터'],
                datasets: [{
                    label: 'MRR',
                    data: [0.50, 0.78, 0.92, 1.00],
                    backgroundColor: [
                        '#BABFD1', 
                        '#8B99B6', 
                        '#607196', 
                        '#FFC759'  
                    ],
                    borderRadius: 6,
                    barPercentage: 0.5,
                    categoryPercentage: 0.8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: { top: 30 }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        enabled: true
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 1.1,
                        grid: { color: '#E8E9ED', drawBorder: false },
                        ticks: { 
                            color: '#9BA1A6', 
                            font: { family: "'Noto Sans KR', sans-serif", size: 12 },
                            stepSize: 0.2
                        }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { 
                            color: '#1F2937', 
                            font: { family: "'Noto Sans KR', sans-serif", size: 14, weight: 'bold' },
                            padding: 10
                        }
                    }
                }
            },
            plugins: [dataLabelsPlugin]
        });
    </script>
